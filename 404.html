<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sourcescape — Page Not Found</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var param = new URLSearchParams(location.search).get('theme');
      var saved = localStorage.getItem('theme');
      var theme = param || saved;
      if (theme === 'dark' || theme === 'light') {
        document.documentElement.dataset.theme = theme;
      }
    })();
    function toggleTheme() {
      var isDark = document.documentElement.dataset.theme === 'dark' ||
        (!document.documentElement.dataset.theme &&
         window.matchMedia('(prefers-color-scheme: dark)').matches);
      var next = isDark ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
    }
  </script>
</head>
<body>

<div class="bg-text">SS</div>

<header>
  <span class="header-label">Systems &amp; Craft</span>
  <div class="header-right">
    <span class="header-year">Est. 2010</span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle color theme">◑</button>
  </div>
</header>

<main class="main--center">
  <div>
    <p class="error-code">404</p>
    <h1 class="error-label">Not Found</h1>
  </div>
  <div class="error-body">
    <p class="descriptor">Page not found</p>
    <p class="message">The page you're looking for doesn't exist or has moved. Head back to the home page.</p>
    <a href="/" class="home-link">
      Back to home
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M2 7H12M8 3L12 7L8 11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</main>

<footer>
  <span class="footer-copy">© <script>document.write(new Date().getFullYear())</script> Sourcescape LLC</span>
  <span class="footer-copy">All rights reserved</span>
</footer>

</body>
</html>
